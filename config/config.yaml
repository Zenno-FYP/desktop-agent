# Zenno Desktop Agent Configuration

## PHASE 1: Real-time Monitoring Settings

# Sampling interval in seconds (how often to check active window)
# Note: Longer intervals reduce CPU and give more responsive input handling
# Recommended: 3-4 seconds for responsive UI, 2 seconds for precise tracking
# If experiencing mouse/keyboard lag, increase this value
sample_interval_sec: 5

# Flush interval in seconds (how often to flush logs to database)
flush_interval_sec: 300  # configurable

# Idle threshold in seconds (inactivity before marking as idle)
# 10 sec: Captures genuine away-from-desk, ignores brief thinking pauses
idle_threshold_sec: 10

# Behavioral metrics settings
behavioral_metrics:
  click_debounce_ms: 50  # Ignore clicks < 50ms apart (auto-clicks)
  max_typing_intensity_kpm: 200
  max_mouse_click_rate_cpm: 200



## PHASE 2: Block Evaluation Settings

# Block duration in seconds for context state evaluation
# Used by: BlockEvaluator._run_loop() and evaluate_block()
# Purpose: Aggregates all activity logs from a block window to predict context state
# Flow:
#   1. Wakes at wall-clock boundaries (e.g., 2:00, 2:05, 2:10)
#   2. Queries all NULL-context logs from past block_duration_sec
#   3. Aggregates metrics: KPM, CPM, scrolls, app switches, idle time
#   4. Runs ML model (or heuristic fallback) to predict context state
#   5. Retroactively tags all logs in block with prediction
# Fallback: If config missing, defaults to 300 seconds
block_duration_sec: 300

# BlockEvaluator settings
block_evaluator:
  # Startup delay in seconds before first evaluation (allows logs to accumulate)
  startup_delay_sec: 300  # 5 minutes default

# Heuristic rule thresholds for context detection (8-Signal Based Decision Tree)
# Used by: ContextDetector.detect_context() decision tree
# Purpose: FALLBACK when ML model unavailable or low-confidence
# Architecture: Signal-based thresholds that feed a unified decision tree
# Output states (synced with ML 5-class model): Flow, Debugging, Research, Communication, Distracted
# Note: Only used if ml_enabled=false OR ml prediction confidence < ml_confidence_threshold
heuristics:
  
  # ╔════════════════════════════════════════════════════════════════════════════╗
# ║                    USER-SPECIFIC BEHAVIORAL THRESHOLDS                      ║
# ║                                                                             ║
# ║  ⚠️  IMPORTANT: These thresholds are PERSONALIZED for one user's          ║
# ║                behavioral patterns from 36 observed activity blocks.        ║
# ║                                                                             ║
# ║  DO NOT use these for other developers - recalibrate from THEIR data!      ║
# ║                                                                             ║
# ║  This user's unique patterns:                                              ║
# ║  - Research = Pure READING (0 typing) + HIGH clicking (link navigation)    ║
# ║  - Flow = Variable typing (0-200 KPM) + Moderate mouse (0-16k pixels)     ║
# ║  - Blocks are VARIABLE duration (5-300 sec), not uniform 5-min            ║
# ║  - Deletion keys are SPARSE (mostly 0)                                    ║
# ║                                                                             ║
# ║  Future: Implement per-user calibration from their activity logs          ║
# ╚════════════════════════════════════════════════════════════════════════════╝
  # All units normalized to 5-minute block evaluation window
  # Key Fix: Switches/hour => Switches per block. Corrected: 4-12/HR is only 2-5/block
  
  # SIGNAL 0: Typing Intensity (KPM - per minute) - REAL CALIBRATED FROM 52 BLOCKS
  # Real Flow (n=36): 0-200 KPM, mean=35.9, median=0 (58% are ZERO - reading code!)
  # Real Research (n=11): ALL ZEROS (0 KPM - pure reading mode!)
  # FINDING: 58% of Flow blocks have ZERO typing (examining code, thinking)
  # This is NORMAL - developers read before/after typing
  typing_kpm_flow_min: 0             # Minimum for Flow (allow reading code, zero is normal!)
  typing_kpm_research_max: 1         # Maximum for Research (reading = 0 typing, tolerance=1)
  typing_kpm_pure_reading: 2         # Threshold for \"pure reading\" mode (0 typing + high clicks = Research)
  
  # SIGNAL 1: Correction Ratio (deletion_keys / total_keystrokes)
  # PRIMARY DIFFERENTIATOR between DEBUGGING and FLOW
  # DEBUGGING: >12% corrections (the "stuck" signal)
  # FLOW: <8% corrections (confident typing)
  # Ambiguous zone: 8-12% (resolved by other signals)
  correction_ratio_debug_min: 0.12   # > 12% = DEBUGGING (trial & error)
  correction_ratio_flow_max: 0.08    # < 8% = FLOW (confident, minimal fixes)
  
  # SIGNAL 2: Mouse Velocity (px/sec, CORRECTED for REAL OBSERVED DATA)
  # Real observation: 500-20,000 pixels per 5-min block = 1.67-66.7 px/sec max
  # NOTE: Scrolling is bursty (not continuous), high idle_ratio reflects reading
  # FLOW: 10-45 px/sec (controlled navigation, thinking pauses)
  # RESEARCH: 30-70 px/sec (bursty scrolling with reading time = high idle)
  # DEBUGGING: 20-55 px/sec (scattered navigation between files/errors)
  # DISTRACTED: 0-15 px/sec (video) OR 25-67 px/sec (social scrolling)
  mouse_velocity_flow_max: 45        # Max px/sec for Flow (was 90 - too high for real data)
  mouse_velocity_research_min: 30    # Min px/sec for Research (was 100 - unrealistic scrolling)
  mouse_velocity_debug_min: 20       # Min px/sec for Debugging (was 40)
  mouse_velocity_debug_max: 55       # Max px/sec for Debugging (was 150 - unrealistic)
  mouse_velocity_distraction_high: 70   # High distraction threshold (was 200 - unrealistic)
  
  # SIGNAL 3: Mouse Click Rate (CPM - per minute) - REAL CALIBRATED
  # Real Flow (n=13): 0-12 CPM, mean=3.28 (LOW - mostly navigation)
  # Real Research (n=10): 1.16-35.98 CPM, mean=15.71 (HIGH - clicking links, expanding blocks)
  # KEY: Research = HIGH clicks + ZERO typing = Link navigation in reading
  mouse_cpm_research_light: 8        # Min CPM for Research (was 10 - real min is 1.16, mean 15.71)
  mouse_cpm_research_high: 30        # Max CPM for Research (clicking limit, real max 35.98)
  mouse_cpm_distraction_high: 20     # Min CPM for Distraction (high interaction)
  
  # SIGNAL 4: App Switch Frequency (NOTE: PER 5-MIN BLOCK, NOT PER HOUR)
  # Unit Fix Critical: 4-12 switches/hour = only 0.3-1.0 switches/block
  #                    Our metric is switches PER BLOCK (5 minutes), not per hour
  # FLOW: <3 switches per block (locked in, no context switching)
  # DEBUGGING: >4 switches per block (jumping between IDE, browser, terminal)
  # DISTRACTED: >8 switches per block (erratic tab/app switching)
  switches_per_block_debug_min: 4    # Minimum switches for Debugging pattern
  switches_per_block_distraction_min: 8  # Minimum switches for Distraction pattern
  
  # SIGNAL 5: App Score (time-weighted average, -1.0 to 1.0)
  # Unit Fix: Use weighted average by duration, not simple mean
  # Example: 4 min IDE (1.0) + 1 min Spotify (-1.0) = (1.0×240 + (-1.0)×60) / 300 = 0.6
  # FLOW: >0.5 (mostly productive apps)
  # RESEARCH: 0.5 (neutral, browser)
  # DISTRACTION: <-0.5 (mostly distraction apps)
  app_score_flow_min: 0.5            # Min app_score for Flow
  app_score_research: 0.5            # Expected app_score for Research (browser)
  app_score_distraction_max: -0.5    # Max app_score for Distraction (mostly off-task)
  
  # SIGNAL 6: Idle Ratio (idle_duration_sec / total_duration_sec)
  # Thinking time is OK (20-40% idle is normal for coding)
  # RESEARCH: 20-50% idle (reading/absorbing information)
  # DISTRACTION: 40-80% idle (staring at entertainment)
  idle_ratio_research_min: 0.2       # Min idle ratio for Research
  idle_ratio_research_max: 0.5       # Max idle ratio for Research
  
  # SIGNAL 7: Consecutive Work Hours (session-based fatigue)
  # Unit Fix: Uses NOW() - SESSION_START, NOT time-of-day
  # Resets on 30+ minute breaks (break_threshold)
  # CRITICAL: This is NOT "time of day" (2 PM means nothing)
  # It's "hours worked in current session" (same person is fresh at 2 PM after lunch)
  fatigue_moderate_hours: 4.0        # >4 consecutive hours = fatigue starting (allow lower KPM)
  fatigue_high_hours: 6.0            # >6 consecutive hours = significant fatigue (reduce confidence)
  session_reset_idle_minutes: 30     # Break >30 min = reset session counter (user is fresh)
  
  # CONFIDENCE SCORES (final tuple returned by detect_context)
  confidence_flow: 0.92              # Good signals, fresh user
  confidence_flow_fatigued_moderate: 0.85  # >4 hours worked, some fatigue
  confidence_flow_fatigued_high: 0.75     # >6 hours worked, high fatigue
  confidence_debugging: 0.85         # >12% corrections + other debug signals
  confidence_research: 0.80          # Low typing + high scrolling
  confidence_communication: 0.80     # Slack/Teams app detected
  confidence_distracted: 0.75        # Off-task app + no project context
  confidence_distracted_sticky_project: 0.60  # Off-task app BUT with project_name (reading in project)
  confidence_ambiguous: 0.55         # Unclear classification
  
  # ========== CONTEXT-AWARE IDLE HANDLING (NEW) ==========
  # PRIORITY 0: Heuristic pre-check for high-idle blocks (idle_ratio > 0.70)
  # "Where was the user when they went silent?"
  # Note: These override ML model for idle_ratio > 0.70
  
  idle_ratio_threshold: 0.70         # Threshold for context-aware idle handling
  
  confidence_communication_listening: 0.75  # User idle in Zoom/Teams/Slack (active listening)
  confidence_research_thinking: 0.65       # User idle in IDE (deep thinking/planning)
  confidence_research_tutorial: 0.70       # User idle with project open (watching tutorial/waiting)
  confidence_distracted_away: 0.75         # User idle without project (away/lunch/netflix)

# Project context detection (IDE titles + safe filesystem probing)
# Used by: ProjectDetector class (monitor/project_detector.py)
# Purpose: Extract active project name and file from IDE window context
# Strategy (3-layer fallback):
#   1. PID-based inspection: Read open files from IDE process, walk up to find project root markers
#   2. Window title parsing: Extract project/file from VS Code, PyCharm title formats
#   3. Safe directory search: Bounded filesystem search (time + depth limits) as last resort
project_detector:
  # IDE Detection Configuration
  # Used by: ProjectDetector._find_matching_ide() for dynamic IDE detection
  # Purpose: Define IDEs and their executable names (no hardcoding)
  # Structure:
  #   - name: Display name (for logging/reports)
  #   - executable_names: List of .exe names to match (case-insensitive) - PRIMARY IDENTIFIER
  #   - title_suffixes: DEPRECATED - No longer used (kept for reference only)
  #   - title_format: Parsing rule - "vscode" (filename - path - IDE) or "pycharm" (project - [file])
  # 
  # IMPORTANT: IDE detection is NOW BASED ONLY on executable names, not window title.
  # This prevents browser tabs (Brave, Chrome) containing IDE keywords from being misidentified as IDEs.
  # 
  # Adding a new IDE: Just add a new entry below. Ensure unique executable_names. No code changes needed.
  # Example entry:
  #   - name: "RustRover"
  #     executable_names: ["rustrover.exe", "rustrover"]
  #     title_suffixes: ["RustRover"]  # For reference only, not used in detection
  #     title_format: "pycharm"
  ides:
    - name: "VS Code"
      executable_names: ["code.exe", "code", "code-oss"]
      title_suffixes: ["Visual Studio Code"]
      title_format: "vscode"
    
    - name: "Cursor"
      executable_names: ["cursor.exe", "cursor-win.exe", "cursor-linux", "cursor"]
      title_suffixes: ["Cursor"]
      title_format: "vscode"
    
    - name: "Antigravity"
      executable_names: ["antigravity.exe", "antigravity"]
      title_suffixes: ["Antigravity"]
      title_format: "generic"
    
    - name: "PyCharm"
      executable_names: ["pycharm64.exe", "pycharm32.exe", "pycharm.exe", "pycharm", "pycharmce.exe"]
      title_suffixes: ["PyCharm"]
      title_format: "pycharm"
    
    - name: "IntelliJ IDEA"
      executable_names: ["idea64.exe", "idea.exe", "idea", "intellij"]
      title_suffixes: ["IntelliJ", "IDEA"]
      title_format: "pycharm"
    
    - name: "WebStorm"
      executable_names: ["webstorm64.exe", "webstorm.exe", "webstorm"]
      title_suffixes: ["WebStorm"]
      title_format: "pycharm"
    
    - name: "Sublime Text"
      executable_names: ["sublime.exe", "sublime_text.exe", "sublime"]
      title_suffixes: ["Sublime Text"]
      title_format: "generic"
    
    - name: "Vim/Neovim"
      executable_names: ["nvim.exe", "nvim", "vim.exe", "vim"]
      title_suffixes: ["VIM", "nvim"]
      title_format: "generic"
    
    - name: "Emacs"
      executable_names: ["emacs.exe", "emacs"]
      title_suffixes: ["Emacs"]
      title_format: "generic"
    
    - name: "Atom"
      executable_names: ["atom.exe", "atom"]
      title_suffixes: ["Atom"]
      title_format: "generic"

  # Project root markers to look for when resolving paths
  # Used by: ProjectDetector._get_project_path_from_pid()
  # Purpose: When walking up from an open file, stop at first directory containing a marker
  # Example: .git in /home/user/myproject/.git → myproject is the root
  # Fallback: If config missing, returns empty list (no fallback defaults)
  project_markers:
    - .git
    - package.json
    - requirements.txt
    - setup.py
    - Makefile
    - gradle.build
    - pom.xml
    - .project
    - tsconfig.json
    - next.config.js
    - vite.config.js

  # Safe base directories to probe (no full-disk scans)
  # Used by: ProjectDetector.get_project_path() 
  # Purpose: When title extraction succeeds but path doesn't exist, check these safe dirs
  # Example: Title says "myproject", check ~/Projects/myproject before doing full drive search
  # Performance: Checked before expensive filesystem scan (protects < 5% CPU constraint)
  # Fallback: If config missing, returns empty list (no fallback defaults)
  watch_dirs:
    - "~/Documents"
    - "~/Projects"
    - "~/Development"
    - "~/Code"
    - "~/workspace"

  # File extension → detected language mapping (used when capturing raw logs)
  # Used by: ProjectDetector.get_detected_language()
  # Purpose: Extract programming language from active file extension
  # Example: main.py → "Python", app.ts → "TypeScript"
  # Impact: Stored in raw_activity_logs.language for skill tracking, aggregation
  # Fallback: If extension not found, returns None (no default language)
  language_extensions:
    # Backend Languages
    .py: "Python"
    .java: "Java"
    .cpp: "C++"
    .c: "C"
    .cs: "C#"
    .go: "Go"
    .rs: "Rust"
    .rb: "Ruby"
    .php: "PHP"
    .pl: "Perl"
    .scala: "Scala"
    .groovy: "Groovy"
    .lua: "Lua"
    
    # Frontend Languages
    .js: "JavaScript"
    .ts: "TypeScript"
    .jsx: "React"
    .tsx: "React"
    .vue: "Vue"
    .svelte: "Svelte"
    .astro: "Astro"
    .html: "HTML"
    .css: "CSS"
    .scss: "SCSS"
    .sass: "Sass"
    .less: "Less"
    
    # Web Frameworks & APIs
    .graphql: "GraphQL"
    .gql: "GraphQL"
    
    # Data & Databases
    .sql: "SQL"
    .mongodb: "MongoDB"
    .nosql: "NoSQL"
    
    # Configuration & Markup
    .json: "JSON"
    .yaml: "YAML"
    .yml: "YAML"
    .xml: "XML"
    .env: "Environment"
    .env.local: "Environment"
    .env.production: "Environment"
    .env.development: "Environment"
    .editorconfig: "Config"
    .prettierrc: "Config"
    .eslintrc: "Config"
    .babelrc: "Config"
    .gitignore: "Config"
    .dockerignore: "Config"
    .npmrc: "Config"
    .nvmrc: "Config"
    .nvmrc.json: "Config"
    .toml: "TOML"
    .ini: "INI"
    .conf: "Config"
    
    # Documentation
    .md: "Markdown"
    .rst: "ReStructuredText"
    .textile: "Textile"
    .adoc: "AsciiDoc"
    
    # Shell Scripts
    .sh: "Shell"
    .bash: "Bash"
    .zsh: "Zsh"
    .ps1: "PowerShell"
    .cmd: "Batch"
    .bat: "Batch"
    
    # Build & DevOps
    Dockerfile: "Docker"
    Makefile: "Make"
    CMakeLists.txt: "CMake"
    pom.xml: "Maven"
    build.gradle: "Gradle"
    build.gradle.kts: "Gradle"
    Gemfile: "Ruby"
    Pipfile: "Python"
    setup.py: "Python"
    requirements.txt: "Python"
    package.json: "JavaScript"
    package-lock.json: "JavaScript"
    yarn.lock: "JavaScript"
    pnpm-lock.yaml: "JavaScript"
    poetry.lock: "Python"
    go.mod: "Go"
    go.sum: "Go"
    Cargo.toml: "Rust"
    Cargo.lock: "Rust"

  # Strictly bounded drive search fallback (only used when needed)
  # Used by: ProjectDetector._lightweight_drive_search()
  # Purpose: Last resort fallback when title extraction + watch_dirs don't find project
  # Safety: Hard limits (time + depth) prevent CPU/memory overload (< 5% CPU constraint)
  # Flow: 
  #   1. Extracts filename from window title
  #   2. Iterates drives (skips C: unless necessary) with time/depth circuits
  #   3. Stops at time_limit_sec even if search incomplete
  #   4. Returns None if not found within limits (won't hang the agent)
  # Fallback: If config missing, returns empty exclude_dirs, zero limits (search disabled)
  lightweight_search:
    # Directories to skip during search (lowercased comparison)
    # Purpose: Avoid scanning expensive system dirs (slows down agent)
    # Examples: node_modules (thousands of files), __pycache__ (Python cache), Windows (system)
    exclude_dirs:
      - windows
      - program files
      - program files (x86)
      - programdata
      - appdata
      - $recycle.bin
      - node_modules
      - vendor
      - temp
      - tmp
      - cache
      - .git
      - __pycache__
      - system volume information
      - users
      - recovery
      - system32
      - syswow64
    # Maximum directory depth to search (from drive root)
    # Purpose: Prevents search from going too deep (very slow on deep nested structures)
    # Example: max_depth=6 means C:\a\b\c\d\e\f (6 levels max from C:\)
    # Trade-off: 6 levels finds most projects, but won't find deeply nested ones
    # Fallback: If missing, defaults to 0 (search disabled)
    max_depth: 6
    # Maximum time in seconds for entire search across all drives
    # Purpose: PRIMARY safety mechanism (hard circuit breaker)
    # Checked every iteration: if elapsed > time_limit_sec, ABORT immediately
    # Example: 1.0 sec = search won't block UI longer than 1 second
    # Fallback: If missing, defaults to 0.0 (search disabled, returns None)
    time_limit_sec: 1.0
    # Whether to search C: (system drive) last or skip entirely
    # Purpose: C: scan is expensive, often contains Windows/Program Files/huge temp dirs
    # True: Check all user drives first, then C: only if needed (current behavior)
    # False: Skip C: entirely (faster but might miss projects on system drive)
    # Fallback: If missing, defaults to False (C: skipped)
    search_system_drive_last: false

## PHASE 3: Machine Learning Settings

# Enable/disable ML model-based predictions
# Used by: BlockEvaluator._init_ml() and _predict_context()
# True: Attempt to load XGBoost model, use ML predictions if available
# False: Skip ML entirely, always use heuristic fallback
# Fallback: If config missing, defaults to True (try ML)
ml_enabled: true

# Path to trained ML model (XGBoost classifier)
# Used by: BlockEvaluator._init_ml() to load the model
# Format: Relative to workspace root, expands ~ for home directory
# Fallback: If config missing, returns None (ML disabled, no model loaded)
# Note: Path must be correct - if file doesn't exist, falls back to heuristics
ml_model_path: ./data/models/context_detector.pkl

# Confidence threshold for ML predictions (0.0 - 1.0)
# Used by: BlockEvaluator._predict_context()
# Purpose: Control ML vs heuristic trade-off
# Logic:
#   IF ml_confidence >= ml_confidence_threshold: Use ML prediction (accurate)
#   ELIF ml_confidence < threshold: Fallback to heuristic (safer)
#   Value 0.5: Use ML when >= 50% confident, else heuristic
#   Value 0.9: Use ML only when very confident, mostly use heuristic
# Fallback: If config missing, defaults to 0.5 (50%)
ml_confidence_threshold: 0.5

# ML App Productivity Scoring & Application Categorization (Single Source of Truth)
#
# This section defines how all apps are categorized across the system:
#   1. FeatureExtractor (ML model): Uses these lists to calculate Signal 5 (app_score)
#   2. ContextDetector (Heuristic fallback): Uses these lists to classify apps
#   3. BlockEvaluator: Uses these to determine context and mark touched_distraction_app
#
# CONSOLIDATION BENEFIT:
#   - No duplicate app lists scattered across config
#   - Heuristic and ML make identical app categorization decisions
#   - Single update point for app classifications
#   - Easier to customize user app categorizations
#
# STRUCTURE (4-tier scoring for ML):
#   - productive_apps: IDEs, editors (Score: 1.0) → Indicates "Flow" context
#   - communication_apps: Chat, email, meetings (Score: 0.0) → Indicates "Communication" context
#   - distraction_apps: Social media, entertainment (Score: -1.0) → Indicates "Distracted" context
#   - neutral_apps: Browsers, documentation tools (Score: 0.5) → Context depends on other signals
#
# HOW HEURISTIC USES THIS:
#   - productive_apps: Indicates "Focused" state when combined with high KPM
#   - distraction_apps: Immediate trigger for "Distracted" state
#   - communication_apps and neutral_apps: Ignored by heuristic (ML-specific fine-tuning)
#
# EXAMPLES:
#   - VSCode (productive) + high KPM → Flow
#   - Discord (distraction) + variable KPM → Distracted
#   - Chrome (neutral) + high mouse → Research (depends on other signals)
#
# NOTE: The old app_categorization section is deprecated. All app lists are now here (ml_app_scoring).
# To customize: Add/remove apps from the relevant list below. Both heuristic and ML will use them.
ml_app_scoring:
  # Productive apps (IDEs, editors) - Score: 1.0
  # Used in: Flow, Debugging context states
  # NOTE: App names are base names without .exe (extraction logic strips extensions)
  productive_apps:
    - vscode
    - visual studio code
    - code
    - cursor
    - cursor-linux
    - cursor-win
    - antigravity
    - pycharm
    - pycharmce
    - intellij
    - idea
    - webstorm
    - sublime
    - sublime text
    - neovim
    - nvim
    - vim
    - emacs
    - atom
  
  # Communication apps (chat, meetings, email) - Score: 0.0
  # Used in: Communication context state
  # NOTE: App names are base names without .exe (extraction logic strips extensions)
  communication_apps:
    - slack
    - teams
    - microsoft teams
    - telegram
    - whatsapp
    - zoom
    - meet
    - google meet
    - outlook
    - mail
    - discord
  
  # Distraction apps (social media, entertainment, gaming) - Score: -1.0
  # Used in: Distracted context state
  # NOTE: App names are base names without .exe (extraction logic strips extensions)
  distraction_apps:
    - discord
    - twitter
    - x
    - youtube
    - reddit
    - facebook
    - instagram
    - tiktok
    - twitch
    - spotify
    - netflix
  
  # Neutral apps (browsers, documentation, tools) - Score: 0.5
  # Used in: Any state, depending on other signals (KPM, mouse, idle)
  # NOTE: App names are base names without .exe (extraction logic strips extensions)
  neutral_apps:
    - chrome
    - google chrome
    - firefox
    - safari
    - edge
    - msedge
    - microsoft edge
    - opera
    - notion
    - confluence
    - jira
    - github
    - github desktop
    - gitlab
    - bitbucket


## PHASE 3B: Experience Sampling Method (ESM) Settings

# ESM Popup configuration for ground-truth data collection
# Used by: BlockEvaluator._init_esm_popup() and evaluate_block()
# Purpose: Collect user verification when ML/heuristic confidence is low
# Flow:
#   1. BlockEvaluator tags block with prediction + confidence
#   2. If confidence < esm_popup.confidence_threshold, queue popup
#   3. ESMPopup shows user the prediction and 2 buttons (correct/incorrect)
#   4. User's answer collected as ground truth for future model training
# Note: Non-blocking (popup queued, doesn't block aggregation)
# Fallback: If config missing/disabled, no popups shown (silent prediction)
esm_popup:
  enabled: true              # Enable/disable ESM popup collection
  
  # Confidence threshold for triggering ESM popup
  # If prediction confidence < this, show popup for user verification
  confidence_threshold: 0.70
  
  # Rate limiting - prevent notification fatigue
  rate_limiting:
    min_interval_hours: 0.25  # Minimum 15 minutes between popups
    max_per_day: 20           # Maximum 20 popups per day
  
  # UI Settings
  ui:
    auto_dismiss_seconds: 30   # Auto-close popup after 30 seconds
    window_geometry: "550x280+950+50"  # Size and position (wider for 3-col button layout)
    
    # Colors (hex format)
    colors:
      background: "#2b2b2b"      # Dark background (charcoal)
      text: "#ffffff"            # White text
      subtext: "#cccccc"         # Light gray subtext

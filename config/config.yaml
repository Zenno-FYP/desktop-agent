## PHASE 4: Aggregation Pipeline Settings

# ETL Pipeline Settings (Maestro Orchestrator)
# Used by: 
#   - DesktopAgent (agent.py - COLLECTION PHASE): Applies sticky project logic when flushing sessions
#   - ETL pipeline (aggregate/ module - AGGREGATION PHASE): Buckets events and runs aggregators
# Purpose: Configure context aggregation behavior (project stickiness, app display names)
# NOTE: SHIFT-LEFT IMPLEMENTATION
#   - Sticky project logic moved to COLLECTION PHASE (agent.py)
#   - When a browser/terminal session has no explicit project, it inherits last-detected project
#   - This means raw_activity_logs table is CLEAN from the first second (no NULL projects)
# Flow:
#   1. Raw behavioral events collected with timestamps + app + window title
#   2. [NEW] At collection: When flushing a generic app (browser) with no project:
#      a. Check if sticky_project_name exists in memory
#      b. Check if it's within TTL window (15 min)
#      c. If yes: Assign detected project to this activity; if no: leave as NULL
#   3. Timezone: Auto-detected from system (buckets events into daily sessions at local midnight)
#   4. app_name_mapping: Normalize app display names (code.exe → "VS Code") for reports
# Fallback: If config missing, defaults:  sticky_ttl=900s, no normalization
etl_pipeline:
  # Sticky project context TTL in seconds
  # Used by: DesktopAgent._apply_sticky_project() during collection
  # Purpose: Maintain project context across app switches (IDE → browser → IDE workflow)
  # Implementation (Collection-Phase / Shift-Left):
  #   When user switches to generic app (Chrome, Firefox, Terminal) with no project detected:
  #   1. Check: Is there a sticky_project_name in memory?
  #   2. Check: Was it seen less than TTL seconds ago?
  #   3. Yes: Assign that project to browser activity → clean data in DB
  #   4. No: Leave project NULL
  # Multitasking Example:
  #   00:00-05:00 VS Code (Project A): sticky = "Project A"
  #   00:05-10:00 Chrome (no project): sticky is valid → DB saved as "Project A"
  #   00:10-15:00 PyCharm (Project B): sticky = "Project B" (overwrites)
  #   00:15-20:00 Chrome (no project): sticky is valid → DB saved as "Project B" (NOT A!)
  # Agent Restart: On startup, DesktopAgent._recover_sticky_project() queries the DB
  #   to find the last non-NULL project and seeds it into memory if within TTL.
  # Benefit: Eliminates need for Maestro to guess project context (data is clean at source)
  sticky_project_ttl_sec: 900  # 15 minutes = 900 seconds
  
  # App name normalization mapping (executable → friendly name)
  # Used to clean up .exe filenames for display and aggregation
  # Without this: Reports show "code.exe", "pycharm64.exe" (ugly, browser-unmappable)
  # With this: Reports show "VS Code", "PyCharm" (readable, consistent)
  app_name_mapping:
    # IDEs & Editors
    code.exe: "VS Code"
    cursor.exe: "Cursor"
    cursor-win.exe: "Cursor"
    antigravity.exe: "Antigravity"
    pycharm64.exe: "PyCharm"
    studio64.exe: "Android Studio"
    sublime.exe: "Sublime Text"
    idea.exe: "IntelliJ IDEA"
    
    # Browsers
    chrome.exe: "Google Chrome"
    msedge.exe: "Microsoft Edge"
    firefox.exe: "Firefox"
    brave.exe: "Brave"
    
    # Communication & Social
    whatsapp.exe: "WhatsApp"
    telegram.exe: "Telegram"
    slack.exe: "Slack"
    teams.exe: "Microsoft Teams"
    discord.exe: "Discord"
    
    # Media & Entertainment
    spotify.exe: "Spotify"
    netflix.exe: "Netflix"
    vlc.exe: "VLC Media Player"
    
    # Development Tools
    windowsterminal.exe: "Terminal"
    postman.exe: "Postman"
    git.exe: "Git"
    docker.exe: "Docker"
    
    # Office & Productivity
    winword.exe: "Microsoft Word"
    excel.exe: "Microsoft Excel"
    powerpnt.exe: "Microsoft PowerPoint"
  
  # Browser detection and service name mapping
  # Used by: ETLPipeline._extract_browser_app_name() during aggregation
  # Purpose: For browser activity, extract service name from URL/tab title for granular tracking
  # Flow:
  #   1. When aggregating app activity, check if app is a known browser
  #   2. If browser: parse active_file (URL/tab name) and search for keywords
  #   3. If keyword found: use service name instead of generic "Chrome" or "Firefox"
  #   4. If no keyword: fallback to browser name (current behavior maintained)
  # Example:
  #   Raw: app="Chrome", active_file="https://chat.openai.com/..."
  #   Detected: "chatgpt" keyword → Aggregated as "ChatGPT" (not "Chrome")
  #   Result: Reports show ChatGPT usage, not generic Chrome time
  # Pros:
  #   - Tracks which services/platforms users spend time on (not just browser name)
  #   - Identifies productivity (AWS, Swagger) vs distraction (YouTube, Twitter)
  #   - Helps quantify work types (research, cloud work, documentation)
  # Maintenance:
  #   - Add browsers as they emerge (lowercase, match window.title)
  #   - Add keywords as you discover new services (longer/specific first)
  #   - Keywords are case-insensitive matching on URL/tab name
  browser_detection:
    # List of browser executable/process names (lowercase)
    # Example: chrome.exe → "chrome", firefox.exe → "firefox"
    browsers:
      - chrome
      - firefox
      - brave
      - safari
      - edge
      - opera
      - browser
    
    # Keywords mapping: Search string (in URL/tab) → Display name for reports
    # Matching logic: If active_file contains ANY of these keywords (case-insensitive), 
    #                 use the display_name instead of browser name
    # Order matters: More specific keywords should come first (longer matches)
    # Add new services: Just add new keyword → display_name pairs below
    service_keywords:
      # AI/LLM Services
      chatgpt: "ChatGPT"
      chat.openai: "ChatGPT"
      openai: "OpenAI"
      gemini: "Gemini"
      claude: "Claude"
      copilot: "Copilot"
      
      # Development Tools & Platforms
      swagger: "Swagger"
      github: "GitHub"
      gitlab: "GitLab"
      bitbucket: "Bitbucket"
      stack overflow: "Stack Overflow"
      stackoverflow: "Stack Overflow"
      postman: "Postman"
      insomnia: "Insomnia"
      
      # Cloud & DevOps Platforms
      amazonaws: "AWS"
      aws: "AWS"
      azure: "Azure"
      google cloud: "Google Cloud"
      heroku: "Heroku"
      digitalocean: "DigitalOcean"
      
      # Media & Content Platforms
      youtube: "YouTube"
      wikipedia: "Wikipedia"
      medium: "Medium"
      
      # Productivity & Communication
      google: "Google"
      maps: "Maps"
      slack: "Slack"
      notion: "Notion"
      figma: "Figma"
      dribbble: "Dribbble"
      linkedin: "LinkedIn"
      twitter: "Twitter"
      x.com: "X"
      reddit: "Reddit"
  
  # Language to skill mapping (detected_language → skill category)
  # Used by: Aggregate pipeline (skill category reporting and analysis)
  # Purpose: Group programming languages into broader skill domains for portfolio/reporting
  # Flow:
  #   1. ProjectDetector identifies language from file extension (.py, .ts, .java, etc.)
  #   2. LOC scanner counts lines of code per language
  #   3. This mapping converts language → skill (Python, JavaScript → Backend, Frontend)
  #   4. Aggregation reports show "Backend 1000 hr" vs granular "Python 500, Go 500"
  # Impact: Skills become the reporting unit for dashboards (backend %, frontend %, etc.)
  # Fallback: If config missing, no skill mapping (language-based reporting only)
  language_to_skill_mapping:
    # Backend Languages
    Python: "Backend"
    Java: "Backend"
    C#: "Backend"

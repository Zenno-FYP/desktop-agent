# Database Settings
db:
  path: ./data/db/zenno.db
  # Thread safety settings
  check_same_thread: false   # Allow cross-thread SQLite access
  timeout: 10.0              # Lock timeout in seconds
  # Connection pool
  journal_mode: WAL          # Write-Ahead Logging for concurrent access

## Logging Settings
logging:
  level: INFO                # DEBUG, INFO, WARNING, ERROR
  file: ./logs/agent.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

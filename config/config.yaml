    # Systems Programming
    "C++": "Systems"
    C: "Systems"
    Rust: "Systems"
    
    # Frontend Languages & Frameworks
    JavaScript: "Frontend"
    TypeScript: "Frontend"
    React: "Frontend"
    Vue: "Frontend"
    Svelte: "Frontend"
    Astro: "Frontend"
    HTML: "Frontend"
    CSS: "Frontend"
    SCSS: "Frontend"
    Sass: "Frontend"
    Less: "Frontend"
    
    # Mobile Development
    Swift: "Mobile"
    Kotlin: "Mobile"
    
    # Data & APIs
    SQL: "Data"
    MongoDB: "Data"
    NoSQL: "Data"
    GraphQL: "Data"
    
    # DevOps & Infrastructure
    Docker: "DevOps"
    Make: "DevOps"
    CMake: "DevOps"
    Maven: "DevOps"
    Gradle: "DevOps"
    Shell: "DevOps"
    Bash: "DevOps"
    Zsh: "DevOps"

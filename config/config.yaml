# Zenno Desktop Agent Configuration

## PHASE 1: Real-time Monitoring Settings

# Sampling interval in seconds (how often to check active window)
sample_interval_sec: 2

# Flush interval in seconds (how often to flush logs to database)
flush_interval_sec: 300  # 5 minutes

# Idle threshold in seconds (inactivity before marking as idle)
# 10 sec: Captures genuine away-from-desk, ignores brief thinking pauses
idle_threshold_sec: 10

# Behavioral metrics settings
behavioral_metrics:
  click_debounce_ms: 50  # Ignore clicks < 50ms apart (auto-clicks)

# Privacy mode: strict (no titles) or relaxed (hashed titles)
privacy_mode: strict

## PHASE 2: Block Evaluation Settings

# Block duration in seconds for context state evaluation
block_duration_sec: 300  # 5 minutes

# Heuristic rule thresholds
heuristics:
  # FOCUSED: High typing + moderate clicks + few app switches
  focused_kpm_min: 40         # Minimum KPM for focused work
  focused_cpm_min: 15         # Minimum CPM for focused work
  focused_app_switches_max: 2 # Max app switches to still be "focused"
  focused_confidence: 0.92    # Confidence score for focused state
  
  # READING: Low typing + low clicks + active scrolling
  reading_kpm_max: 20         # Max KPM for reading
  reading_cpm_max: 10         # Max CPM for reading
  reading_scrolls_min: 5      # Min scrolls to count as reading
  reading_confidence: 0.80
  
  # RESEARCH/DEBUGGING: Multiple app switches but all productive apps
  research_app_switches_min: 3 # Min app switches for research/debugging
  research_scrolls_min: 5      # Min scrolls to count as research
  research_cpm_min: 5          # Min CPM for research activity
  research_confidence: 0.85    # Confidence score for research state
  
  # IDLE: High idle ratio (away from keyboard)
  idle_ratio_threshold: 0.5   # >50% idle = idle state
  idle_confidence: 0.85
  
  # DISTRACTED: Multiple app switches with distraction apps
  distracted_app_switches_min: 3 # Min app switches to be distracted
  distracted_confidence: 0.75
  distracted_immediate_confidence: 0.85  # With distraction app + low kpm
  distracted_immediate_kpm_max: 30

# App Categorization Settings
app_categorization:
  enabled: true              # Enable/disable app categorization
  
  # Distraction/blacklist apps (social media, entertainment, messaging)
  # Any app matching these substrings will:
  # - Be marked as "Distracted" context state
  # - Be attributed to __unassigned__ project (not real work projects)
  # - Clear sticky project state
  distraction_apps:
    - discord
    - discord.exe
    - telegram
    - telegram.exe
    - whatsapp
    - whatsapp.exe
    - twitter
    - x.exe
    - instagram
    - instagram.exe
    - tiktok
    - tiktok.exe
    - youtube
    - youtube.exe
    - facebook
    - facebook.exe
    - reddit
    - reddit.exe
    - twitch
    - twitch.exe
    - spotify
    - spotify.exe
    - netflix
    - netflix.exe
    - hulu
    - hulu.exe
    - pinterest
    - pinterest.exe
    - snapchat
    - snapchat.exe
    - messenger
  
  # Custom distraction apps (additional apps to add to the list above)
  # Format: app names to monitor as distractions
  custom_distraction_apps:
    - gaming_app
    - streaming_service
    # Users can add their own apps here
  
  # Custom productivity apps (add to default list)
  custom_productivity_apps:
    - custom_ide
    - internal_tool
    # Users can add their own apps here
  
  # Apps to exclude from monitoring
  exclude_apps:
    - System
    - explorer.exe

# Project context detection (IDE titles + safe filesystem probing)
project_detector:
  # Project root markers to look for when resolving paths
  project_markers:
    - .git
    - package.json
    - requirements.txt
    - setup.py
    - Makefile
    - gradle.build
    - pom.xml
    - .project
    - tsconfig.json
    - next.config.js
    - vite.config.js

  # Safe base directories to probe (no full-disk scans)
  watch_dirs:
    - "~/Documents"
    - "~/Projects"
    - "~/Development"
    - "~/Code"
    - "~/workspace"

  # File extension → detected language mapping (used when capturing raw logs)
  language_extensions:
    .py: "Python"
    .js: "JavaScript"
    .ts: "TypeScript"
    .jsx: "React"
    .tsx: "React"
    .java: "Java"
    .cpp: "C++"
    .c: "C"
    .cs: "C#"
    .go: "Go"
    .rs: "Rust"
    .rb: "Ruby"
    .php: "PHP"
    .swift: "Swift"
    .kt: "Kotlin"
    .html: "HTML"
    .css: "CSS"
    .sql: "SQL"
    .json: "JSON"
    .yaml: "YAML"
    .yml: "YAML"
    .xml: "XML"
    .md: "Markdown"

  # Strictly bounded drive search fallback (only used when needed)
  lightweight_search:
    exclude_dirs:
      - windows
      - program files
      - program files (x86)
      - programdata
      - appdata
      - $recycle.bin
      - node_modules
      - vendor
      - temp
      - tmp
      - cache
      - .git
      - __pycache__
      - system volume information
      - users
      - recovery
      - system32
      - syswow64
    max_depth: 6
    time_limit_sec: 1.0
    search_system_drive_last: true

## PHASE 3: Machine Learning Settings

# Enable/disable ML model-based predictions
ml_enabled: true

# Path to trained ML model (XGBoost classifier)
ml_model_path: ./data/models/context_detector.pkl

# Confidence threshold for ML predictions (0.0 - 1.0)
# If ML confidence <= this threshold, fall back to heuristic rules
# Default: 0.5 (50%) - use ML when confident enough, otherwise use rule-based detection
ml_confidence_threshold: 0.5

## PHASE 3B: Experience Sampling Method (ESM) Settings

# ESM Popup configuration for ground-truth data collection
esm_popup:
  enabled: true              # Enable/disable ESM popup collection
  
  # Confidence threshold for triggering ESM popup
  # If prediction confidence < this, show popup for user verification
  confidence_threshold: 0.70
  
  # Rate limiting - prevent notification fatigue
  rate_limiting:
    min_interval_hours: 0.5   # Minimum 30 minutes between popups
    max_per_day: 20           # Maximum 20 popups per day
  
  # UI Settings
  ui:
    auto_dismiss_seconds: 30   # Auto-close popup after 30 seconds
    window_geometry: "450x180+1050+20"  # Size and position (center-right, fully visible)
    
    # Colors (hex format)
    colors:
      background: "#2b2b2b"      # Dark background
      text: "#ffffff"            # White text
      subtext: "#888888"         # Gray subtext
      button_positive: "#1a7f12" # Green (Focused, Reading)
      button_negative: "#7f1212" # Red (Distracted, Idle)
      button_hover_pos: "#2a9f22"    # Green hover
      button_hover_neg: "#9f2222"    # Red hover
    
    # Typography
    fonts:
      title: "Arial 11 bold"
      message: "Arial 10"
      subtext: "Arial 9"
      button: "Arial 9 bold"

## PHASE 4: Aggregation Pipeline Settings

# ETL Pipeline Settings (Maestro Orchestrator)
etl_pipeline:
  # Local timezone offset used for daily bucketing (midnight splitting)
  # Example: +5.5 for IST, -5 for EST.
  local_tz_offset_hours: 0

  # Sticky project context TTL in seconds
  # When user switches to an app without explicit project context (e.g., browser, terminal),
  # inherit last-seen project if within this TTL window
  sticky_project_ttl_sec: 900  # 15 minutes
  
  # App name normalization mapping (executable → friendly name)
  # Used to clean up .exe filenames for display and aggregation
  app_name_mapping:
    code.exe: "VS Code"
    chrome.exe: "Google Chrome"
    msedge.exe: "Microsoft Edge"
    windowsterminal.exe: "Terminal"
    pycharm64.exe: "PyCharm"
    studio64.exe: "Android Studio"
    postman.exe: "Postman"
  
  # Language to skill mapping (detected_language → skill category)
  # Maps programming languages to their broader skill domains for reporting
  language_to_skill_mapping:
    Python: "Backend"
    JavaScript: "Frontend"
    TypeScript: "Frontend"
    Java: "Backend"
    "C++": "Systems"
    "C#": "Backend"
    Go: "Backend"
    Rust: "Systems"
    Ruby: "Backend"
    PHP: "Backend"
    Swift: "Mobile"
    Kotlin: "Mobile"
    SQL: "Data"
    HTML: "Frontend"
    CSS: "Frontend"
    Unknown: "Other"

# Lines of Code (LOC) Scanner Settings
loc_scanner:
  # File extensions → language mapping (for code volume tracking)
  language_extensions:
    .py: "Python"
    .js: "JavaScript"
    .ts: "TypeScript"
    .jsx: "JavaScript"
    .tsx: "TypeScript"
    .java: "Java"
    .cpp: "C++"
    .cc: "C++"
    .cxx: "C++"
    .c: "C"
    .h: "C"
    .hpp: "C++"
    .cs: "C#"
    .go: "Go"
    .rs: "Rust"
    .rb: "Ruby"
    .php: "PHP"
    .swift: "Swift"
    .kt: "Kotlin"
    .scala: "Scala"
    .sh: "Bash"
    .bash: "Bash"
    .sql: "SQL"
    .html: "HTML"
    .htm: "HTML"
    .css: "CSS"
    .scss: "SCSS"
    .sass: "SASS"
    .less: "LESS"
    .json: "JSON"
    .yaml: "YAML"
    .yml: "YAML"
    .xml: "XML"
    .md: "Markdown"
    .rst: "ReStructuredText"
    .tex: "LaTeX"
    .r: "R"
    .lua: "Lua"
    .perl: "Perl"
    .dart: "Dart"

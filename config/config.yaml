# Lines of Code (LOC) Scanner Settings
# Used by: LOCScanner class (aggregate/loc_scanner.py - code volume quantification)
# Purpose: Identify programming languages and measure development output (lines written per session)
# Flow:
#   1. When context switches to IDE (VS Code, PyCharm), capture current project path
#   2. Recursively scan project directory for source files
#   3. Match file extensions against language_extensions mapping
#   4. Count total lines per language and skip unwanted directories (node_modules, .git, etc.)
#   5. Report: "Python 1200 LOC, JavaScript 800 LOC" for session
# Impact: Quantifies productivity output (LOC is input to context state heuristics)
# Safety: skip_directories prevents double-counting (node_modules duplicates source files) and scanning build artifacts
# Fallback: If config missing, no language mapping (files unclassified), no directory skipping (slow scans)
loc_scanner:
  # How often to run background LOC scans (hourly)
  # Used by: DesktopAgent._check_idle_and_scan_loc()
  # Scans all projects that have been active since their last scan
  scan_interval_sec: 3600

  # File extensions → language mapping (for code volume tracking)
  language_extensions:
    .py: "Python"
    .js: "JavaScript"
    .ts: "TypeScript"
    .jsx: "JavaScript"
    .tsx: "TypeScript"
    .java: "Java"
    .cpp: "C++"
    .cc: "C++"
    .cxx: "C++"
    .c: "C"
    .h: "C"
    .hpp: "C++"
    .cs: "C#"
    .go: "Go"
    .rs: "Rust"
    .rb: "Ruby"
    .php: "PHP"
    .swift: "Swift"
    .kt: "Kotlin"
    .scala: "Scala"
    .sh: "Bash"
    .bash: "Bash"
    .sql: "SQL"
    .html: "HTML"
    .htm: "HTML"
    .css: "CSS"
    .scss: "SCSS"
    .sass: "SASS"
    .less: "LESS"
    .json: "JSON"
    .yaml: "YAML"
    .yml: "YAML"
    .xml: "XML"
    .md: "Markdown"
    .rst: "ReStructuredText"
    .tex: "LaTeX"
    .r: "R"
    .lua: "Lua"
    .perl: "Perl"
    .dart: "Dart"
    .groovy: "Groovy"
    .clojure: "Clojure"
    .erl: "Erlang"
    .exs: "Elixir"
    .vim: "VimScript"
    .m: "Objective-C"
    .hx: "Haxe"
  
  # Directories to skip during code scanning (build/dependency folders)
  # Purpose: Prevent LOC scanner from counting generated/downloaded code
  # Rationale: 
  #   - node_modules: 10,000+ files (inflates LOC, slows scan, not developer-written)
  #   - __pycache__: Compiled bytecode (duplicates .py files, 20x inflation)
  #   - .git: Version history (not actual development output)
  #   - build/dist/target: Generated artifacts (compiler/build output, not source)
  #   - venv/.venv: Virtual environments (auto-generated, external packages)
  # Impact: 10-100x faster scans + accurate LOC counting (no artificial inflation)
  # Fallback: If config missing, all directories scanned (very slow, inflated LOC counts)
  skip_directories:
    - .git
    - .svn
    - node_modules
    - venv
    - .venv
    - __pycache__
    - dist
    - build
    - target
    - .gradle
    - .idea
    - .vscode
    - .cargo
    - vendor
    - .mypy_cache
    - .pytest_cache
    - .tox
    - .env
    - ".egg-info"
    - ".eggs"
    - ".next"
    - ".nuxt"
    - ".vercel"
    - site-packages
    - ".flutter-plugins"
    - cocoapods
    - ".bundle"
    - ".sass-cache"
    - ".jekyll-cache"

# Database Settings
# Used by: MaestroETL, EventLogger, ContextAggregator (database/ module - persistent storage)
# Purpose: Configure SQLite connection behavior (concurrency, performance, reliability)
# Flow:
#   1. Behavioral events + context snapshots written to SQLite (aggregation queries read same DB)
#   2. check_same_thread=false: Allow background thread (ETL) to write while main thread reads (reports)
#   3. journal_mode=WAL: Write-Ahead Logging maintains database integrity during concurrent access
#   4. timeout: If one thread locks DB, other waits up to 10 seconds before giving up
# Impact: 
#   - Concurrent reads/writes without data corruption
#   - Faster transaction commits (WAL mode optimized for SQLite)
# Fallback: If config missing, defaults: path=./data/db/zenno.db, check_same_thread=False, timeout=10.0, journal_mode=WAL
db:
  path: ./data/db/zenno.db
  # Thread safety settings
  # Cross-thread access: Set to false when multiple threads access same DB (ETL write + report read)
  # Set to true only if single-threaded application (safety constraint)
  check_same_thread: false   # Allow cross-thread SQLite access
  timeout: 10.0              # Lock timeout in seconds (how long readers/writers wait if DB locked)
  # Connection pool
  # WAL = Write-Ahead Logging: Separates read lock from write lock (readers don't block writers)
  # Alternative: TRUNCATE (slower for concurrent access), DELETE (slowest, full ACID)
  journal_mode: WAL          # Write-Ahead Logging for concurrent access

## Logging Settings
# Used by: Python logging module (all modules - diagnose runtime behavior)
# Purpose: Configure verbosity level, output file, and message format for debugging/monitoring
# Levels (order of detail):
#   DEBUG (10): Detailed function entry/exit, variable values, all decision points
#   INFO (20): High-level flow events (process start, config loaded, session created)
#   WARNING (30): Condition that should not happen but doesn't crash (missing config, fallback triggered)
#   ERROR (40): Exceptions, failures, data loss (invalid file, DB corruption)
# Flow:
#   1. Each log message gets formatted with timestamp + logger name + level + message
#   2. Written to both console (stderr) and file (./logs/agent.log)
#   3. File rotated automatically when exceeding size limit (if handler configured)
# Production recommendation: 
#   - LOCAL: level=DEBUG (diagnose issues, understand behavior)
#   - PRODUCTION: level=INFO (only important events, small log files)
# Fallback: If config missing, defaults: level=WARNING, file=stderr only
logging:
  level: ERROR                # DEBUG, INFO, WARNING, ERROR
  file: ./logs/agent.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
